name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

# Required for OIDC (secure authentication without keys)
permissions:
  id-token: write   # This allows GitHub to get a short-lived token from AWS
  contents: read

env:
  AWS_REGION: eu-north-1                    # ← CHANGE to your region (e.g. eu-west-1)
  ECR_REPOSITORY: demo-app-repo              # ← CHANGE to your ECR repository name
  ECS_SERVICE: my-demo-app-task-service-z3smgc31                  # ← CHANGE to your ECS service name
  ECS_CLUSTER: my-demo-app-cluster                  # ← CHANGE to your ECS cluster name
  ECS_TASK_DEFINITION: .aws/task-definition.json   # Path to your task definition JSON file in the repo
  CONTAINER_NAME: my-demo-app-container          # ← CHANGE to the container name inside your task definition

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (Secure OIDC - No access keys!)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/GitHubActions-ECS-Deploy-aeakindunbi   # ← PASTE YOUR ROLE ARN HERE (from the IAM role you created earlier)
          role-session-name: GitHubActions-ECS-Deploy

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2   # Updated version

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}   # Uses commit SHA as tag (best practice)
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2   # Updated to latest
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
